<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Cover illustration for language and direction metadata in JSON strings</title>
  <desc id="desc">A simple 16 by 9 cover image with standard curly braces and abstract data fields.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.62" stop-color="#eff8f6"/>
      <stop offset="1" stop-color="#fff7ea"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5fbfb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="32" flood-color="#1f4b55" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g transform="translate(470 190)" filter="url(#shadow)">
    <rect width="660" height="520" rx="34" fill="url(#card)" stroke="#c6dee4" stroke-width="2"/>

    <text x="132" y="310"
          font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
          font-size="250"
          font-weight="400"
          text-anchor="middle"
          dominant-baseline="middle"
          fill="#2f80ed"
          opacity="0.78">{</text>
    <text x="528" y="310"
          font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
          font-size="250"
          font-weight="400"
          text-anchor="middle"
          dominant-baseline="middle"
          fill="#22a699"
          opacity="0.78">}</text>

    <g fill="none" stroke-linecap="round">
      <path d="M242 260H418" stroke="#b7d0d8" stroke-width="5"/>
      <path d="M330 184V336" stroke="#d3e2e6" stroke-width="3"/>
    </g>

    <circle cx="330" cy="184" r="17" fill="#2f80ed"/>
    <circle cx="330" cy="260" r="17" fill="#22a699"/>
    <circle cx="330" cy="336" r="17" fill="#f2a33a"/>

    <g opacity="0.94">
      <rect x="260" y="126" width="140" height="46" rx="23" fill="#e9f3ff" stroke="#c3dbf8"/>
      <rect x="260" y="238" width="140" height="46" rx="23" fill="#e8f7f3" stroke="#bfe4dc"/>
      <rect x="260" y="350" width="140" height="46" rx="23" fill="#fff2dc" stroke="#efd2a1"/>
    </g>
  </g>
</svg>
